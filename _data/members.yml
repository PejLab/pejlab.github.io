- name: Pejman Mohammadi
  title: PI, Associate Professor
  image: Pejman_Mohammadi_gray.jpg
  bio: >-
    Pejman is a computational biologist whose work sits at the intersection of
    statistical machine learning, probabilistic modeling, and genomics. His lab
    develops quantitative frameworks that formalize biochemical principles and
    regulatory mechanisms to improve inference from noisy, high-dimensional
    genomic data, with applications to regulatory variation, transcriptomics,
    rare disease, and personalized medicine.
    </p><p>
    Pejman joined the University of Washington and Seattle Children's Research
    Institute as an Associate Professor in 2023. Prior to that, he was on the
    faculty at Scripps Research in San Diego, first as an Assistant Professor
    and later as an Associate Professor. He holds a Ph.D. in Computational
    Biology from ETH Zurich and completed postdoctoral training at the New York
    Genome Center and Columbia University.
    </p><p>
    <a href="mailto:pejmanm@uw.edu">pejmanm@uw.edu</a>

